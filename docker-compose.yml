services:
  opspilot:
    build: .
    image: opspilot:latest
    container_name: opspilot
    restart: unless-stopped
    # 仅绑定到宿主机本地回环,不直接暴露公网。
    # 通过反向代理(Nginx/Caddy)+ 鉴权对外提供服务。
    # 若仅内网测试可临时改为 "8000:8000"。
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # AI 配置文件路径(容器内)
      OPS_AI_CONFIG: /app/config/ai.yaml
      # API Key 通过 .env 注入,不写进镜像或 compose 文件
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      COMPAT_API_KEY: ${COMPAT_API_KEY:-}
    volumes:
      # 挂载真实配置(含密钥引用),只读。修改配置无需重建镜像。
      - ./config/ai.yaml:/app/config/ai.yaml:ro
      - ./config/hosts.yaml:/app/config/hosts.yaml:ro
      # 如需让容器读取宿主机日志做分析,可按需挂载(只读),例如:
      # - /var/log:/var/log:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/healthz').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
